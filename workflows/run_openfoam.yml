name: OpenFOAM PimpleFoam Simulation

on:
  push:
    paths:
      - 'OpenFOAM/case/constant/thermophysicalProperties'

jobs:
  run-sim:
    runs-on: ubuntu-latest
    container: 
      image: openfoam/openfoam10-default
      options: --user root

    steps:
      - uses: actions/checkout@v3

      - name: Install ParaView (for pvpython)
        run: |
          apt-get update
          apt-get install -y paraview

      - name: Run OpenFOAM and Post-processing
        run: |
          . /usr/lib/openfoam/openfoam10/etc/bashrc
          cd OpenFOAM/case
          chmod +x Allrun
          ./Allrun

      - name: Upload Screenshots
        uses: actions/upload-artifact@v3
        with:
          name: flow-results
          path: OpenFOAM/case/screenshots/
