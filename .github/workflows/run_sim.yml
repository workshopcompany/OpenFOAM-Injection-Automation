# .github/workflows/run_sim.yml
#
# MIM-Ops Cloud Solver — GitHub Actions Workflow
# ================================================
# Triggered by Streamlit via /repos/{owner}/{repo}/dispatches
# (event_type: "run-simulation")
#
# Artifacts uploaded:
#   simulation-{signal_id}   ← frames/*.png + results.txt + results.json

name: Run MIM Injection Simulation

on:
  repository_dispatch:
    types: [run-simulation]

  workflow_dispatch:
    inputs:
      signal_id:
        description: 'Signal ID (test run)'
        default: 'manual-test'
      stl_filename:
        description: 'STL filename in repo'
        default: 'part.stl'

jobs:
  simulate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ───────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Dependencies ───────────────────────────────────
      # NOTE: kaleido 제거 — 헤드리스 환경에서 plotly PNG export 불안정
      #       matplotlib + Agg 백엔드로 대체 (solver.py 참고)
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy trimesh scipy matplotlib rtree pandas vtk

      # ── 4. Prepare STL ────────────────────────────────────
      - name: Prepare STL from Repo
        run: |
          echo "🔍 Searching for STL file in 'input/part.stl'..."

          if [ -f "input/part.stl" ]; then
            cp input/part.stl part.stl
            echo "✅ STL file found and copied from input/part.stl"
            echo "STL_PATH=part.stl" >> $GITHUB_ENV

          elif [ -f "part.stl" ]; then
            echo "✅ STL file found in root"
            echo "STL_PATH=part.stl" >> $GITHUB_ENV

          else
            echo "❌ Error: part.stl not found in repository."
            ls -R
            exit 1
          fi

      # ── 5. Parse packed payload fields ────────────────────
      # gate_pos  = "x,y,z,dia"
      # sim_opts  = "material,num_frames,res"
      - name: Parse packed fields
        run: |
          IFS=',' read -r GX GY GZ GDIA <<< "${{ github.event.client_payload.gate_pos }}"
          echo "G_X=${GX:-0.0}"     >> $GITHUB_ENV
          echo "G_Y=${GY:-0.0}"     >> $GITHUB_ENV
          echo "G_Z=${GZ:-0.0}"     >> $GITHUB_ENV
          echo "G_DIA=${GDIA:-2.0}" >> $GITHUB_ENV

          IFS=',' read -r MAT FRAMES RES <<< "${{ github.event.client_payload.sim_opts }}"
          echo "S_MAT=${MAT:-17-4PH}"  >> $GITHUB_ENV
          echo "S_FRAMES=${FRAMES:-15}" >> $GITHUB_ENV
          echo "S_RES=${RES:-0.5}"     >> $GITHUB_ENV

      # ── 6. Run solver ─────────────────────────────────────
      - name: Run Solver
        run: |
          python solver.py \
            --signal_id   "${{ github.event.client_payload.signal_id || inputs.signal_id || 'manual' }}" \
            --gate_x      "$G_X" \
            --gate_y      "$G_Y" \
            --gate_z      "$G_Z" \
            --gate_dia    "$G_DIA" \
            --num_frames  "$S_FRAMES" \
            --mesh_res_mm "$S_RES" \
            --material    "$S_MAT" \
            --temp        "${{ github.event.client_payload.temp || '185' }}" \
            --melt_temp   "${{ github.event.client_payload.temp || '185' }}" \
            --viscosity   "${{ github.event.client_payload.viscosity || '4e-3' }}" \
            --density     "${{ github.event.client_payload.density || '7780' }}" \
            --press       "${{ github.event.client_payload.press || '110' }}" \
            --vel_mms     "${{ github.event.client_payload.vel_mms || '25' }}" \
            --etime       "${{ github.event.client_payload.etime || '10' }}" \
            --stl_path    "$STL_PATH"

      # ── 7. Upload artifacts ───────────────────────────────
      - name: Upload simulation results
        uses: actions/upload-artifact@v4
        with:
          name: simulation-${{ github.event.client_payload.signal_id || inputs.signal_id || 'manual' }}
          path: |
            frames/
            results.txt
            results.json
            VTK/
          retention-days: 30
          if-no-files-found: warn

      # ── 8. Commit result summary back to repo ─────────────
      - name: Commit results summary
        if: always()
        run: |
          git config --global user.name  "MIM-Ops-Bot"
          git config --global user.email "mim-ops-bot@github.com"
          mkdir -p simulation_history
          SIGNAL="${{ github.event.client_payload.signal_id || inputs.signal_id || 'manual' }}"
          cp results.json "simulation_history/${SIGNAL}.json" 2>/dev/null || true
          git add simulation_history/ || true
          git diff --cached --quiet || git commit -m "sim result: ${SIGNAL}"
          git push || true
