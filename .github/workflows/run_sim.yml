# .github/workflows/run_sim.yml
#
# MIM-Ops Cloud Solver — GitHub Actions Workflow
# ================================================
# Triggered by Streamlit via /repos/{owner}/{repo}/dispatches
# (event_type: "run-simulation")
#
# Artifacts uploaded:
#   simulation-{signal_id}   ← frames/*.png + results.txt + results.json

name: Run MIM Injection Simulation

on:
  repository_dispatch:
    types: [run-simulation]

  workflow_dispatch:
    inputs:
      signal_id:
        description: 'Signal ID (test run)'
        default: 'manual-test'
      stl_filename:
        description: 'STL filename in repo'
        default: 'part.stl'

jobs:
  simulate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ───────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Dependencies ───────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy trimesh scipy plotly kaleido rtree pandas

      # ── 4. Prepare STL ────────────────────────────────────
      # Priority: base64 from client_payload → repo file
      - name: Prepare STL file
        env:
          STL_B64:      ${{ github.event.client_payload.stl_b64 }}
          STL_FILENAME: ${{ github.event.client_payload.stl_filename || inputs.stl_filename || 'part.stl' }}
        run: |
          if [ -n "$STL_B64" ]; then
            echo "Decoding base64 STL → $STL_FILENAME ..."
            echo "$STL_B64" | base64 -d > "$STL_FILENAME"
            echo "✅ STL decoded: $STL_FILENAME ($(wc -c < "$STL_FILENAME") bytes)"
            echo "STL_PATH=$STL_FILENAME" >> $GITHUB_ENV
          elif [ -f "$STL_FILENAME" ]; then
            echo "Using repo STL: $STL_FILENAME"
            echo "STL_PATH=$STL_FILENAME" >> $GITHUB_ENV
          else
            echo "ERROR: No STL file found. Commit part.stl to repo root or pass stl_b64."
            exit 1
          fi

      # ── 5. Parse packed payload fields ────────────────────
      # gate_pos  = "x,y,z,dia"
      # sim_opts  = "num_frames,res"
      - name: Parse packed payload fields
        env:
          GATE_POS: ${{ github.event.client_payload.gate_pos || '0.0,0.0,0.0,2.0' }}
          SIM_OPTS: ${{ github.event.client_payload.sim_opts || '15,0.5' }}
        run: |
          IFS=',' read -r gx gy gz dia <<< "$GATE_POS"
          IFS=',' read -r nf res       <<< "$SIM_OPTS"
          echo "GATE_X=${gx:-0.0}"       >> $GITHUB_ENV
          echo "GATE_Y=${gy:-0.0}"       >> $GITHUB_ENV
          echo "GATE_Z=${gz:-0.0}"       >> $GITHUB_ENV
          echo "GATE_DIA=${dia:-2.0}"    >> $GITHUB_ENV
          echo "NUM_FRAMES=${nf:-15}"    >> $GITHUB_ENV
          echo "MESH_RES_MM=${res:-0.5}" >> $GITHUB_ENV

      # ── 6. Run solver ─────────────────────────────────────
      - name: Run MIM Voxel Flow Solver
        env:
          SIGNAL_ID: ${{ github.event.client_payload.signal_id   || inputs.signal_id || 'manual' }}
          VEL_MMS:   ${{ github.event.client_payload.vel_mms     || '25.0' }}
          ETIME:     ${{ github.event.client_payload.etime       || '10.0' }}
          MATERIAL:  ${{ github.event.client_payload.material    || '17-4PH' }}
          VISCOSITY: ${{ github.event.client_payload.viscosity   || '4e-3' }}
          DENSITY:   ${{ github.event.client_payload.density     || '7780' }}
          TEMP:      ${{ github.event.client_payload.temp        || '185' }}
          PRESS:     ${{ github.event.client_payload.press       || '110' }}
        run: |
          python solver.py \
            --signal_id   "$SIGNAL_ID"   \
            --gate_x      "$GATE_X"      \
            --gate_y      "$GATE_Y"      \
            --gate_z      "$GATE_Z"      \
            --gate_dia    "$GATE_DIA"    \
            --vel_mms     "$VEL_MMS"     \
            --etime       "$ETIME"       \
            --num_frames  "$NUM_FRAMES"  \
            --material    "$MATERIAL"    \
            --viscosity   "$VISCOSITY"   \
            --density     "$DENSITY"     \
            --melt_temp   "$TEMP"        \
            --temp        "$TEMP"        \
            --press       "$PRESS"       \
            --mesh_res_mm "$MESH_RES_MM" \
            --stl_path    "$STL_PATH"

      # ── 7. Upload artifacts ───────────────────────────────
      - name: Upload simulation results
        uses: actions/upload-artifact@v4
        with:
          name: simulation-${{ github.event.client_payload.signal_id || inputs.signal_id || 'manual' }}
          path: |
            frames/
            results.txt
            results.json
          retention-days: 30
          if-no-files-found: error

      # ── 8. Commit result summary back to repo ─────────────
      - name: Commit results summary
        if: always()
        run: |
          git config --global user.name  "MIM-Ops-Bot"
          git config --global user.email "mim-ops-bot@github.com"
          mkdir -p simulation_history
          SIGNAL="${{ github.event.client_payload.signal_id || 'manual' }}"
          cp results.json "simulation_history/${SIGNAL}.json" 2>/dev/null || true
          git add simulation_history/ || true
          git diff --cached --quiet || git commit -m "sim result: ${SIGNAL}"
          git push || true
