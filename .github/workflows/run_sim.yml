# .github/workflows/run_sim.yml
#
# MIM-Ops Cloud Solver — GitHub Actions Workflow
# ================================================
# Triggered by Streamlit via /repos/{owner}/{repo}/dispatches
# (event_type: "run-simulation")
#
# Artifacts uploaded:
#   simulation-{signal_id}   ← frames/*.png + results.txt + results.json

name: Run MIM Injection Simulation

on:
  repository_dispatch:
    types: [run-simulation]

  workflow_dispatch:
    inputs:
      signal_id:
        description: 'Signal ID (test run)'
        default: 'manual-test'
      stl_filename:
        description: 'STL filename in repo'
        default: 'part.stl'

jobs:
  simulate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ───────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Dependencies ───────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy trimesh scipy plotly kaleido rtree pandas

      # ── 4. Prepare STL ────────────────────────────────────
      # Priority: base64 from client_payload → repo file
      - name: Decode STL file
        run: |
          if [ -n "${{ github.event.client_payload.stl_b64 }}" ]; then
            echo "${{ github.event.client_payload.stl_b64 }}" | base64 --decode > part.stl
            echo "STL_PATH=part.stl" >> $GITHUB_ENV
          elif [ -n "${{ github.event.inputs.stl_b64 }}" ]; then
            echo "${{ github.event.inputs.stl_b64 }}" | base64 --decode > part.stl
            echo "STL_PATH=part.stl" >> $GITHUB_ENV
          else
            echo "STL_PATH=part.stl" >> $GITHUB_ENV
          fi

      # ── 5. Parse packed payload fields ────────────────────
      # gate_pos  = "x,y,z,dia"
      # sim_opts  = "num_frames,res"
      - name: Parse packed fields
        run: |
          # gate_pos 분리: x, y, z, dia
          IFS=',' read -r GX GY GZ GDIA <<< "${{ github.event.client_payload.gate_pos }}"
          echo "G_X=$GX" >> $GITHUB_ENV
          echo "G_Y=$GY" >> $GITHUB_ENV
          echo "G_Z=$GZ" >> $GITHUB_ENV
          echo "G_DIA=$GDIA" >> $GITHUB_ENV
          
          # sim_opts 분리: material, frames, res
          IFS=',' read -r MAT FRAMES RES <<< "${{ github.event.client_payload.sim_opts }}"
          echo "S_MAT=$MAT" >> $GITHUB_ENV
          echo "S_FRAMES=$FRAMES" >> $GITHUB_ENV
          echo "S_RES=$RES" >> $GITHUB_ENV

      # ── 6. Run solver ─────────────────────────────────────
      - name: Run Solver
        run: |
          python solver.py \
            --signal_id   "${{ github.event.client_payload.signal_id }}" \
            --gate_x      "$G_X" \
            --gate_y      "$G_Y" \
            --gate_z      "$G_Z" \
            --gate_dia    "$G_DIA" \
            --num_frames  "$S_FRAMES" \
            --mesh_res_mm "$S_RES" \
            --material    "$S_MAT" \
            --temp        "${{ github.event.client_payload.temp }}" \
            --melt_temp   "${{ github.event.client_payload.temp }}" \
            --viscosity   "${{ github.event.client_payload.viscosity }}" \
            --density     "${{ github.event.client_payload.density }}" \
            --press       "${{ github.event.client_payload.press }}" \
            --vel_mms     "${{ github.event.client_payload.vel_mms }}" \
            --etime       "${{ github.event.client_payload.etime }}" \
            --stl_path    "$STL_PATH"

      # ── 7. Upload artifacts ───────────────────────────────
      - name: Upload simulation results
        uses: actions/upload-artifact@v4
        with:
          name: simulation-${{ github.event.client_payload.signal_id || 'manual' }}
          path: |
            frames/
            results.txt
            results.json
          retention-days: 30

      # ── 8. Commit result summary back to repo ─────────────
      - name: Commit results summary
        if: always()
        run: |
          git config --global user.name  "MIM-Ops-Bot"
          git config --global user.email "mim-ops-bot@github.com"
          mkdir -p simulation_history
          SIGNAL="${{ github.event.client_payload.signal_id || 'manual' }}"
          cp results.json "simulation_history/${SIGNAL}.json" 2>/dev/null || true
          git add simulation_history/ || true
          git diff --cached --quiet || git commit -m "sim result: ${SIGNAL}"
          git push || true
