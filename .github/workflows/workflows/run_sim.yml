# .github/workflows/run_sim.yml
#
# MIM-Ops Cloud Solver  ─  GitHub Actions Workflow
# ==================================================
# Triggered by Streamlit via /repos/{owner}/{repo}/dispatches
# (event_type: "run-simulation")
#
# Artifacts uploaded:
#   simulation-{signal_id}   ← frames/*.png + results.txt + results.json

name: Run MIM Injection Simulation

on:
  repository_dispatch:
    types: [run-simulation]

  # Allow manual trigger from Actions tab (for testing)
  workflow_dispatch:
    inputs:
      signal_id:
        description: 'Signal ID (test run)'
        default: 'manual-test'
      stl_filename:
        description: 'STL filename in repo'
        default: 'part.stl'

jobs:
  simulate:
    runs-on: ubuntu-latest          # 2-core CPU, 7 GB RAM – free tier
    timeout-minutes: 60             # hard stop at 60 min

    steps:
      # ── 1. Checkout repo ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ──────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install dependencies ───────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            numpy \
            trimesh \
            scipy \
            plotly \
            pandas

      # ── 4. Run Simulation Script ──────────────────────────────
      - name: Run Simulation Script
        env:
          # [수정됨] HTTP 422 에러 해결을 위해 simulation_params 경로 추가
          SIGNAL_ID:   ${{ github.event.client_payload.simulation_params.signal_id || inputs.signal_id }}
          GATE_X:      ${{ github.event.client_payload.simulation_params.gate_x }}
          GATE_Y:      ${{ github.event.client_payload.simulation_params.gate_y }}
          GATE_Z:      ${{ github.event.client_payload.simulation_params.gate_z }}
          GATE_DIA:    ${{ github.event.client_payload.simulation_params.gate_dia }}
          VEL_MMS:     ${{ github.event.client_payload.simulation_params.vel_mms }}
          ETIME:       ${{ github.event.client_payload.simulation_params.etime }}
          NUM_FRAMES:  ${{ github.event.client_payload.simulation_params.num_frames }}
          MATERIAL:    ${{ github.event.client_payload.simulation_params.material }}
          VISCOSITY:   ${{ github.event.client_payload.simulation_params.viscosity }}
          DENSITY:     ${{ github.event.client_payload.simulation_params.density }}
          MELT_TEMP:   ${{ github.event.client_payload.simulation_params.melt_temp }}
          TEMP:        ${{ github.event.client_payload.simulation_params.temp }}
          PRESS:       ${{ github.event.client_payload.simulation_params.press }}
          MESH_RES_MM: ${{ github.event.client_payload.simulation_params.mesh_res_mm }}
          STL_PATH:    ${{ github.event.client_payload.simulation_params.stl_filename || inputs.stl_filename || 'part.stl' }}
        run: |
          mkdir -p frames
          python solver.py \
            --signal_id   "$SIGNAL_ID"   \
            --gate_x      "$GATE_X"      \
            --gate_y      "$GATE_Y"      \
            --gate_z      "$GATE_Z"      \
            --gate_dia    "$GATE_DIA"    \
            --vel_mms     "$VEL_MMS"     \
            --etime       "$ETIME"       \
            --num_frames  "$NUM_FRAMES"  \
            --material    "$MATERIAL"    \
            --viscosity   "$VISCOSITY"   \
            --density     "$DENSITY"     \
            --melt_temp   "$MELT_TEMP"   \
            --temp        "$TEMP"        \
            --press       "$PRESS"       \
            --mesh_res_mm "$MESH_RES_MM" \
            --stl_path    "$STL_PATH"

      # ── 6. Upload artifacts ───────────────────────────────────
      - name: Upload simulation results
        uses: actions/upload-artifact@v4
        with:
          # [수정됨] Artifact 이름 생성 시에도 simulation_params 경로 적용
          name: simulation-${{ github.event.client_payload.simulation_params.signal_id || inputs.signal_id || 'manual' }}
          path: |
            frames/
            results.txt
            results.json
          retention-days: 30
          if-no-files-found: error

      # ── 7. (Optional) commit result summary back to repo ──────
      - name: Commit results summary
        if: always()
        run: |
          git config --global user.name  "MIM-Ops-Bot"
          git config --global user.email "mim-ops-bot@github.com"
          mkdir -p simulation_history
          # [수정됨] SIGNAL 변수 할당 시에도 simulation_params 경로 적용
          SIGNAL="${{ github.event.client_payload.simulation_params.signal_id || 'manual' }}"
          cp results.json "simulation_history/${SIGNAL}.json" 2>/dev/null || true
          git add simulation_history/
          git commit -m "Add simulation result: $SIGNAL" || echo "No changes to commit"
          git push || echo "Push failed or not needed"
