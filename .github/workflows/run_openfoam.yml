name: MIM-Ops Flow Analysis

on:
  push:
    paths:
      - 'OpenFOAM/case/constant/transportProperties' # Zapier updates this file
  workflow_dispatch:
    inputs:
      material:
        description: 'Material Name'
        default: 'PP'
        required: true
      velocity:
        description: 'Injection Velocity (m/s)'
        default: '0.05'
      end_time:
        description: 'Simulation End Time (s)'
        default: '0.1'

jobs:
  run-sim:
    runs-on: ubuntu-latest
    # Critical: Use the official OpenFOAM container to recognize commands like blockMesh
    container:
      image: opencfd/openfoam-run:2312
      options: --user root

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Simulation
        shell: bash
        working-directory: OpenFOAM/case
        run: |
          # 1. Grant execution permission
          chmod +x Allrun
          
          # 2. Execute the Allrun script
          # The environment is already set by the container
          ./Allrun

      - name: Upload Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: simulation-results
          path: |
            OpenFOAM/case/postProcessing/
            OpenFOAM/case/log.*
