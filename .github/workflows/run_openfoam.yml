name: MIM-Ops Flow Analysis

on:
  push:
    paths:
      - 'OpenFOAM/case/constant/transportProperties'
  workflow_dispatch:
    inputs:
      velocity:
        description: 'Injection Velocity (m/s)'
        default: '0.05'
      end_time:
        description: 'Simulation End Time (s)'
        default: '0.1'

jobs:
  run-sim:
    runs-on: ubuntu-latest
    # Change to 'dev' image to ensure all tools (surfaceTransformPoints, etc.) are available
    container:
      image: opencfd/openfoam-dev:2312
      options: --user root

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Simulation
        shell: bash
        working-directory: OpenFOAM/case
        run: |
          # CRITICAL: Source OpenFOAM environment
          if [ -f /usr/lib/openfoam/openfoam2312/etc/bashrc ]; then
            . /usr/lib/openfoam/openfoam2312/etc/bashrc
          fi
          
          chmod +x Allrun
          ./Allrun

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulation-results
          path: |
            OpenFOAM/case/results/
            OpenFOAM/case/logs/
