name: OpenFOAM Simulation

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-sim:
    runs-on: ubuntu-latest
    container: 
      image: opencfd/openfoam-run:2312
      options: --user root
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install ParaView
        run: |
          apt-get update
          apt-get install -y paraview python3-vtk9
      
      # ✅ 디버그 단계 추가
      - name: Debug case structure
        run: |
          echo "===== CURRENT DIR ====="
          pwd
          echo "===== FILE TREE ====="
          ls -R
      
      - name: Run OpenFOAM Simulation
        shell: bash
        working-directory: OpenFOAM/case
        run: |
          bash << 'SCRIPT_END'
          set -e
          
          source /usr/lib/openfoam/openfoam2312/etc/bashrc 2>/dev/null || true
          
          echo "===== RUN DIR ====="
          pwd
          echo "===== CASE FILES ====="
          ls -R
          
          mkdir -p screenshots
          
          blockMesh
          snappyHexMesh -overwrite
          
          # ✅ 핵심 수정 (solver 변경)
          buoyantPimpleFoam
          
          pvpython export_screenshots.py
          SCRIPT_END
      
      - name: Check Results
        if: always()
        run: |
          find OpenFOAM/case -name "*.png" -o -name "*.jpg"
          ls -la OpenFOAM/case/screenshots/ || echo "No screenshots"
      
      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flow-results
          path: OpenFOAM/case/screenshots/
