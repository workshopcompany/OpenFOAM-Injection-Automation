name: OpenFOAM Simulation

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-sim:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    container: 
      image: opencfd/openfoam-run:2312
      options: --user root
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Post-Processing Dependencies
        run: |
          apt-get update
          # ParaView와 가상 화면 실행을 위한 필수 패키지들을 모두 설치합니다.
          apt-get install -y paraview python3-paraview xvfb libgl1-mesa-glx libglu1-mesa libxcursor1
      
      - name: Run OpenFOAM Simulation
        shell: bash
        working-directory: OpenFOAM/case
        run: |
          bash << 'SCRIPT_END'
          set -e
          # OpenFOAM 환경 로드
          source /usr/lib/openfoam/openfoam2312/etc/bashrc 2>/dev/null || true
          
          # ✅ pvpython의 절대 경로를 미리 파악합니다.
          PVPYTHON_PATH=$(which pvpython || echo "/usr/bin/pvpython")
          export PVPYTHON_PATH
          echo "Using pvpython at: $PVPYTHON_PATH"
          
          chmod +x Allrun
          
          # xvfb-run을 통해 가상 모니터 환경에서 Allrun 실행
          # --server-args 설정을 통해 렌더링에 필요한 충분한 메모리를 확보합니다.
          xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" ./Allrun
          
          echo "===== DEBUG: log.pvpython output ====="
          cat log.pvpython || echo "No log.pvpython found"
          
          echo "===== DEBUG: screenshots check ====="
          ls -la screenshots/
          SCRIPT_END
      
      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flow-simulation-results
          path: OpenFOAM/case/screenshots/
          if-no-files-found: warn
