name: OpenFOAM PimpleFoam Simulation

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-sim:
    runs-on: ubuntu-latest
    container: 
      image: opencfd/openfoam-run:2312
      options: --user root
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install ParaView
        run: |
          apt-get update
          apt-get install -y paraview python3-vtk9
      
      - name: Run OpenFOAM Simulation
        shell: bash
        working-directory: OpenFOAM/case
        run: |
          # HERE document로 전체 실행
          bash << 'SCRIPT_END'
          set -e  # 에러 발생 시 중단
          
          # OpenFOAM 환경 로드
          source /usr/lib/openfoam/openfoam2312/etc/bashrc 2>/dev/null || true
          
          # 스크린샷 폴더 생성
          mkdir -p screenshots
          
          # 격자 생성 및 시뮬레이션
          blockMesh
          snappyHexMesh -overwrite
          pimpleFoam
          
          # 후처리
          pvpython export_screenshots.py
          SCRIPT_END
      
      - name: Check Results
        if: always()
        run: |
          find OpenFOAM/case -name "*.png" -o -name "*.jpg"
          ls -la OpenFOAM/case/screenshots/ || echo "No screenshots"
      
      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flow-results
          path: OpenFOAM/case/screenshots/
