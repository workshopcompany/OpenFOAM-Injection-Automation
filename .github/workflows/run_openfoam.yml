name: OpenFOAM Simulation

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-sim:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    container: 
      image: opencfd/openfoam-run:2312
      options: --user root
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Post-Processing Dependencies
        run: |
          apt-get update
          # paraview-python(또는 python3-paraview)을 명시적으로 설치합니다.
          apt-get install -y paraview python3-paraview xvfb libgl1-mesa-glx libglu1-mesa
      
      - name: Run OpenFOAM Simulation
        shell: bash
        working-directory: OpenFOAM/case
        run: |
          bash << 'SCRIPT_END'
          set -e
          source /usr/lib/openfoam/openfoam2312/etc/bashrc 2>/dev/null || true
          
          # 시스템에 설치된 pvpython 경로를 찾아서 환경 변수에 추가
          PVPYTHON_PATH=$(which pvpython || echo "/usr/bin/pvpython")
          echo "Using pvpython at: $PVPYTHON_PATH"
          
          chmod +x Allrun
          
          echo "Starting Simulation..."
          # xvfb-run으로 가상 모니터를 띄우고 실행
          xvfb-run --auto-servernum --server-args="-screen 0 1024x768x24" ./Allrun
          
          echo "===== DEBUG: log.pvpython content ====="
          cat log.pvpython || echo "log.pvpython was not created"
          
          echo "===== DEBUG: Final screenshots folder ====="
          ls -la screenshots/
          SCRIPT_END
      
      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flow-simulation-results
          path: OpenFOAM/case/screenshots/
          if-no-files-found: warn
