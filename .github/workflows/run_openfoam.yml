name: OpenFOAM Simulation

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-sim:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    container: 
      image: opencfd/openfoam-run:2312
      options: --user root
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Post-Processing Dependencies
        run: |
          rm -f /etc/apt/sources.list.d/openfoam.list || true
          apt-get update
          apt-get install -y paraview python3-paraview xvfb libgl1-mesa-glx libglu1-mesa libxcursor1
      
      - name: Run OpenFOAM Simulation
        shell: bash
        working-directory: OpenFOAM/case
        run: |
          bash << 'SCRIPT_END'
          set -e
          # 1. 환경 설정
          source /usr/lib/openfoam/openfoam2312/etc/bashrc 2>/dev/null || true
          export PYTHONPATH=$PYTHONPATH:/usr/lib/python3/dist-packages
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/usr/lib/x86_64-linux-gnu
          PVPYTHON_PATH=$(which pvpython || echo "/usr/bin/pvpython")
          export PVPYTHON_PATH
          
          # 결과물을 모을 통합 폴더 생성
          mkdir -p results
          chmod +x Allrun
          
          # 2. 실행
          echo "Starting Simulation & Web Data Export..."
          xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" ./Allrun
          
          echo "===== DEBUG: Final Check (Inside Container) ====="
          ls -R results/
          SCRIPT_END
      
      - name: Upload 3D Interactive Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: OpenFOAM-Web-Dashboard
          # '**/results/'를 사용하면 레포지토리 내 어느 위치에 있든 
          # results 폴더를 찾아 그 안의 모든 내용을 업로드합니다.
          path: |
            **/results/*
          if-no-files-found: error
