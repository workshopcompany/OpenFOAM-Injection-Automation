name: OpenFOAM Simulation

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-sim:
    runs-on: ubuntu-latest
    env:
      # Node.js 20 경고 해결
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    container: 
      image: opencfd/openfoam-run:2312
      options: --user root
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Post-Processing Dependencies
        run: |
          apt-get update
          # ParaView와 가상 화면 실행을 위한 필수 패키지 설치
          apt-get install -y paraview python3-paraview xvfb libgl1-mesa-glx libglu1-mesa libxcursor1
      
      - name: Run OpenFOAM Simulation
        shell: bash
        working-directory: OpenFOAM/case
        run: |
          bash << 'SCRIPT_END'
          set -e
          source /usr/lib/openfoam/openfoam2312/etc/bashrc 2>/dev/null || true
          
          # ✅ 핵심: pvpython의 실제 위치를 찾아 환경변수로 등록
          REAL_PVPYTHON=$(find /usr/bin -name "pvpython" | head -n 1)
          if [ -z "$REAL_PVPYTHON" ]; then
            echo "Error: pvpython not found in /usr/bin. Checking alternative paths..."
            REAL_PVPYTHON=$(which pvpython || echo "/usr/bin/pvpython")
          fi
          export PVPYTHON_BIN=$REAL_PVPYTHON
          echo "Using pvpython path: $PVPYTHON_BIN"
          
          chmod +x Allrun
          
          echo "Starting Simulation..."
          # xvfb-run을 통해 가상 모니터 환경에서 Allrun 실행
          xvfb-run --auto-servernum --server-args="-screen 0 1024x768x24" ./Allrun
          
          echo "===== DEBUG: pvpython log output ====="
          cat log.pvpython || echo "No log.pvpython found"
          
          echo "===== DEBUG: screenshots folder check ====="
          ls -la screenshots/
          SCRIPT_END
      
      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flow-simulation-results
          path: OpenFOAM/case/screenshots/
          if-no-files-found: warn
