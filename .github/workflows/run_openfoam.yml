name: MIM-Ops Flow Analysis

on:
  # 외부 신호 및 수동 실행만 허용하여 중복 실행 방지
  repository_dispatch:
    types: [mim_ops_trigger]
  workflow_dispatch:
    inputs:
      velocity:
        description: 'Injection Velocity'
        default: '100'
      end_time:
        description: 'Simulation End Time'
        default: '0.5'

jobs:
  run-sim:
    runs-on: ubuntu-latest
    container:
      image: opencfd/openfoam-dev:2312
      options: --user root

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup OpenFOAM Dictionaries (Fix Phase Error)
        # interFoam에 필수적인 phases와 물성치를 표준 규격으로 강제 재작성합니다.
        shell: bash
        working-directory: OpenFOAM/case/constant
        run: |
          echo ">>> Re-building transportProperties for interFoam..."
          cat <<EOF > transportProperties
          FoamFile { version 2.0; format ascii; class dictionary; location "constant"; object transportProperties; }
          
          phases (water air);

          water
          {
              transportModel  Newtonian;
              nu              1e-06;
              rho             1000;
          }

          air
          {
              transportModel  Newtonian;
              nu              1.48e-05;
              rho             1.2;
          }

          sigma           0.07;
          EOF
          echo "✅ transportProperties sanitized with phase definitions."

      - name: Execute Solver Pipeline
        shell: bash -l {0}
        working-directory: OpenFOAM/case
        env:
          VELOCITY: ${{ github.event.client_payload.vel || github.event.inputs.velocity || '100' }}
          END_TIME: ${{ github.event.client_payload.etime || github.event.inputs.end_time || '0.5' }}
          SIGNAL_ID: ${{ github.event.client_payload.signal_id || 'manual' }}
        run: |
          echo ">>> [MIM-Ops] Starting Simulation ID: $SIGNAL_ID"
          
          # 1. OpenFOAM 환경 로딩
          if [ -f /usr/lib/openfoam/openfoam2312/etc/bashrc ]; then
              . /usr/lib/openfoam/openfoam2312/etc/bashrc
          elif [ -f /opt/openfoam2312/etc/bashrc ]; then
              . /opt/openfoam2312/etc/bashrc
          fi

          # 2. p_rgh 자동 생성 확인
          [ ! -f 0/p_rgh ] && [ -f 0/p ] && cp 0/p 0/p_rgh && echo ">>> Created p_rgh."

          # 3. 솔버 실행 및 로그 기록
          # set -e를 쓰지 않으므로 실패하더라도 다음 Step으로 이동합니다.
          chmod +x Allrun
          echo ">>> Running interFoam Pipeline..."
          ./Allrun > logs/solver_detailed.log 2>&1
          
          echo ">>> [MIM-Ops] Pipeline process finished."

      - name: Upload Artifacts
        # 오류 발생 여부와 관계없이 항상 결과물과 로그를 업로드합니다.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sim-results-${{ github.event.client_payload.signal_id || 'manual' }}
          path: |
            OpenFOAM/case/results/
            OpenFOAM/case/logs/
            OpenFOAM/case/0/
            OpenFOAM/case/constant/transportProperties
