name: OpenFOAM Simulation

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-sim:
    runs-on: ubuntu-latest
    container: 
      image: opencfd/openfoam-run:2312
      options: --user root
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install ParaView
        run: |
          apt-get update
          apt-get install -y paraview python3-vtk9
      
      - name: Debug case structure
        run: |
          echo "===== CURRENT DIR ====="
          pwd
          echo "===== FILE TREE ====="
          ls -R
      
      - name: Run OpenFOAM Simulation
        shell: bash
        working-directory: OpenFOAM/case
        run: |
          bash << 'SCRIPT_END'
          set -e
          
          # OpenFOAM 환경 설정
          source /usr/lib/openfoam/openfoam2312/etc/bashrc 2>/dev/null || true
          
          echo "===== RUN DIR ====="
          pwd
          
          # Allrun 파일에 실행 권한 부여 및 실행
          # 이를 통해 내부의 interFoam 로직이 정확히 수행됩니다.
          chmod +x Allrun
          ./Allrun
          
          SCRIPT_END
      
      - name: Check Results
        if: always()
        run: |
          find OpenFOAM/case -name "*.png" -o -name "*.jpg"
          ls -la OpenFOAM/case/screenshots/ || echo "No screenshots"
      
      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flow-results
          path: OpenFOAM/case/screenshots/
