name: MIM-Ops Flow Analysis Professional

on:
  repository_dispatch:
    types: [mim_ops_trigger]

  workflow_dispatch:
    inputs:
      material:
        description: 'Material Name (e.g., 17-4PH, 316L, PP, ABS)'
        default: '17-4PH'
      velocity:
        description: 'Injection Velocity (m/s)'
        default: '0.025'
      viscosity:
        description: 'Kinematic Viscosity (m2/s)'
        default: '4e-3'
      density:
        description: 'Density (kg/m3)'
        default: '7780'
      melt_temp:
        description: 'Melt Temperature (В°C)'
        default: '185'
      mold_temp:
        description: 'Mold Temperature (В°C)'
        default: '40'
      end_time:
        description: 'Simulation End Time (s)'
        default: '0.5'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-sim:
    runs-on: ubuntu-latest
    container:
      image: opencfd/openfoam-dev:2312
      options: --user root

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update && apt-get install -y --no-install-recommends \
            python3-pip jq tzdata bc
          pip3 install jinja2 --break-system-packages || pip3 install jinja2

      - name: Execute Solver Pipeline
        shell: bash -l {0}
        working-directory: OpenFOAM/case
        env:
          MATERIAL:  ${{ github.event.client_payload.material  || github.event.inputs.material  || '17-4PH' }}
          VELOCITY:  ${{ github.event.client_payload.vel       || github.event.inputs.velocity  || '0.025' }}
          VISCOSITY: ${{ github.event.client_payload.viscosity || github.event.inputs.viscosity || '4e-3' }}
          DENSITY:   ${{ github.event.client_payload.density   || github.event.inputs.density   || '7780' }}
          MELT_TEMP: ${{ github.event.client_payload.melt_temp || github.event.inputs.melt_temp || '185' }}
          MOLD_TEMP: ${{ github.event.client_payload.mold_temp || github.event.inputs.mold_temp || '40' }}
          END_TIME:  ${{ github.event.client_payload.etime     || github.event.inputs.end_time  || '0.5' }}
          SIGNAL_ID: ${{ github.event.client_payload.signal_id || 'manual' }}
        run: |
          set -e

          # в”Җв”Җ OpenFOAM нҷҳкІҪ лЎңл“ң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
          [ -f /usr/lib/openfoam/openfoam2312/etc/bashrc ] && \
            . /usr/lib/openfoam/openfoam2312/etc/bashrc
          [ -f /opt/openfoam2312/etc/bashrc ] && \
            . /opt/openfoam2312/etc/bashrc

          # в”Җв”Җ л””л үнҶ лҰ¬ ліҙмһҘ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
          mkdir -p logs results

          # в”Җв”Җ мҲ«мһҗ м •м ң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
          FINAL_V=$(echo "$VELOCITY"   | sed 's/[^0-9.eE-]*//g')
          FINAL_NU=$(echo "$VISCOSITY" | sed 's/[^0-9.eE-]*//g')
          FINAL_RHO=$(echo "$DENSITY"  | sed 's/[^0-9.eE-]*//g')
          FINAL_T=$(echo "$END_TIME"   | sed 's/[^0-9.eE-]*//g')
          FINAL_TM=$(echo "$MELT_TEMP" | sed 's/[^0-9.eE-]*//g')
          FINAL_TW=$(echo "$MOLD_TEMP" | sed 's/[^0-9.eE-]*//g')

          echo "=== MIM-Ops Simulation Pipeline Start ==="
          echo ">>> Material: ${MATERIAL} | Signal ID: ${SIGNAL_ID}"
          echo ">>> V=${FINAL_V} | nu=${FINAL_NU} | rho=${FINAL_RHO}"
          echo ">>> Tmelt=${FINAL_TM} | Tmold=${FINAL_TW} | T_end=${FINAL_T}"

          # в”Җв”Җ Allrun мӢӨн–ү в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
          chmod +x Allrun
          VELOCITY=$FINAL_V    \
          VISCOSITY=$FINAL_NU  \
          DENSITY=$FINAL_RHO   \
          END_TIME=$FINAL_T    \
          MELT_TEMP=$FINAL_TM  \
          MOLD_TEMP=$FINAL_TW  \
          MATERIAL=$MATERIAL   \
          ./Allrun 2>&1 | tee logs/solver_detailed.log

          # в”Җв”Җ нӣ„мІҳлҰ¬ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
          touch case.foam
          echo "SIGNAL_ID=${SIGNAL_ID}" >> results/meta.txt
          echo ">>> [MIM-Ops] Pipeline finished successfully."

      - name: Upload Simulation Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mim-results-${{ github.event.client_payload.signal_id || 'manual' }}
          path: |
            OpenFOAM/case/logs/
            OpenFOAM/case/results/
            OpenFOAM/case/case.foam
