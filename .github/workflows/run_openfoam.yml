name: OpenFOAM PimpleFoam Simulation

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-sim:
    runs-on: ubuntu-latest
    container: 
      image: opencfd/openfoam-run:2312
      options: --user root
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install ParaView (for pvpython)
        run: |
          apt-get update
          apt-get install -y paraview
      
      - name: Run OpenFOAM and Post-processing
        shell: bash
        run: |
          source /usr/bin/openfoam2312
          ./Allrun
      
      - name: Debug - Find screenshots
        shell: bash
        run: |
          echo "=== Current directory ==="
          pwd
          echo ""
          echo "=== All PNG/JPG files ==="
          find . -type f \( -name "*.png" -o -name "*.jpg" \) || echo "No images found"
          echo ""
          echo "=== Full directory tree ==="
          ls -R
      
      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flow-results
          path: |
            **/*.png
            **/*.jpg
