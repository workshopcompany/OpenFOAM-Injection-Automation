name: MIM-Ops Flow Analysis

on:
  repository_dispatch:
    types: [mim_ops_trigger]
  workflow_dispatch:
    inputs:
      velocity:
        description: 'Injection Velocity'
        default: '100'
      end_time:
        description: 'Simulation End Time'
        default: '0.5'

jobs:
  run-sim:
    runs-on: ubuntu-latest
    container:
      image: opencfd/openfoam-dev:2312
      options: --user root

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Simulation Environment
        shell: bash
        run: |
          echo ">>> Preparing directories and fixing dictionary errors..."
          mkdir -p OpenFOAM/case/logs
          mkdir -p OpenFOAM/case/results

          # 1. [기존 유지] transportProperties 생성
          cat <<EOF > OpenFOAM/case/constant/transportProperties
          FoamFile { version 2.0; format ascii; class dictionary; location "constant"; object transportProperties; }
          phases (water air);
          water { transportModel Newtonian; nu 1e-06; rho 1000; }
          air { transportModel Newtonian; nu 1.48e-05; rho 1.2; }
          sigma 0.07;
          EOF

          # 2. [기존 유지] 0/alpha.water 초기 조건 파일 생성
          cat <<EOF > OpenFOAM/case/0/alpha.water
          FoamFile { version 2.0; format ascii; class volScalarField; location "0"; object alpha.water; }
          dimensions [0 0 0 0 0 0 0];
          internalField uniform 0;
          boundaryField {
              inlet { type fixedValue; value uniform 1; }
              outlet { type zeroGradient; }
              walls { type zeroGradient; }
              frontAndBack { type empty; }
          }
          EOF

          # 3. [핵심 수정] fvSolution 문법 에러 해결을 위해 파일을 새로 작성
          # 기존 sed 방식은 줄 번호가 어긋나면 문법이 깨지므로, 안전하게 전체를 덮어씁니다.
          cat <<EOF > OpenFOAM/case/system/fvSolution
          FoamFile { version 2.0; format ascii; class dictionary; location "system"; object fvSolution; }
          solvers
          {
              "alpha.water.*"
              {
                  nAlphaCorr      1;
                  nAlphaSubCycles 1;
                  cAlpha          1;
                  MULESCorr       yes;
                  nLimiterIter    3;
                  solver          smoothSolver;
                  smoother        symGaussSeidel;
                  tolerance       1e-8;
                  relTol          0;
              }
              "p_rgh.*"
              {
                  solver          GAMG;
                  tolerance       1e-07;
                  relTol          0.01;
                  smoother        DIC;
              }
              "(U|k|epsilon|omega|f|v2).*"
              {
                  solver          smoothSolver;
                  smoother        symGaussSeidel;
                  tolerance       1e-05;
                  relTol          0.1;
              }
          }
          PIMPLE { nOuterCorrectors 1; nCorrectors 2; nNonOrthogonalCorrectors 0; }
          EOF
          echo "✅ fvSolution re-written to fix syntax errors."

      - name: Execute Solver Pipeline
        shell: bash -l {0}
        working-directory: OpenFOAM/case
        env:
          VELOCITY: ${{ github.event.client_payload.vel || github.event.inputs.velocity || '100' }}
          END_TIME: ${{ github.event.client_payload.etime || github.event.inputs.end_time || '0.5' }}
          SIGNAL_ID: ${{ github.event.client_payload.signal_id || 'manual' }}
        run: |
          # OpenFOAM 환경 로드 (경로 이중 확인 유지)
          [ -f /usr/lib/openfoam/openfoam2312/etc/bashrc ] && . /usr/lib/openfoam/openfoam2312/etc/bashrc
          [ -f /opt/openfoam2312/etc/bashrc ] && . /opt/openfoam2312/etc/bashrc

          # p_rgh 필드 복사 로직 유지
          [ ! -f 0/p_rgh ] && [ -f 0/p ] && cp 0/p 0/p_rgh

          # Allrun 실행 및 실시간 로그 기록 유지
          chmod +x Allrun
          echo ">>> Running interFoam solver..."
          ./Allrun 2>&1 | tee logs/solver_detailed.log

          # 시각화용 파일 생성
          touch case.foam

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-sim-results-${{ github.event.client_payload.signal_id || 'manual' }}
          path: |
            OpenFOAM/case/
            !OpenFOAM/case/platforms/
            !OpenFOAM/case/dynamicCode/
