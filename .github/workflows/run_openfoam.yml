name: OpenFOAM Simulation

on:
  workflow_dispatch:
    inputs:
      velocity:
        description: 'Inlet Velocity (m/s)'
        default: '2.5'
        required: true
      viscosity:
        description: 'Kinematic Viscosity (m2/s)'
        default: '1e-6'
        required: true
      end_time:
        description: 'Simulation End Time (s)'
        default: '5'
        required: true
      run_label:
        description: 'Run Label (for report)'
        default: 'default-run'
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-sim:
    runs-on: ubuntu-latest
    container:
      image: opencfd/openfoam-run:2312
      options: --user root

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update && apt-get install -y --no-install-recommends \
            paraview python3-paraview \
            xvfb libgl1-mesa-glx libglu1-mesa libxcursor1 \
            python3-pip \
            tzdata
          pip3 install jinja2 --break-system-packages || pip3 install jinja2

      - name: Run OpenFOAM Simulation
        shell: bash
        working-directory: OpenFOAM/case
        env:
          # ✅ 핵심: JSON 객체가 아닌 개별 값을 정확히 주입합니다.
          INPUT_VELOCITY: ${{ github.event.inputs.velocity }}
          INPUT_VISCOSITY: ${{ github.event.inputs.viscosity }}
          INPUT_END_TIME: ${{ github.event.inputs.end_time }}
        run: |
          set -e
          source /usr/lib/openfoam/openfoam2312/etc/bashrc 2>/dev/null || true
          
          echo ">>> [MIM-Ops] 파라미터 매핑 시작"
          echo "Value of INPUT_VELOCITY: $INPUT_VELOCITY"

          # 1. 0/U 파일 수정 (입구 유속 주입)
          # 이제 $INPUT_VELOCITY에는 '5.0' 같은 순수 숫자만 들어있습니다.
          sed -i "/inlet/,/}/ s/value[[:space:]]*uniform[[:space:]]*(.* 0 0);/value           uniform ($INPUT_VELOCITY 0 0);/" 0/U
          
          # 2. constant/transportProperties 수정 (점도 주입)
          sed -i "s/nu[[:space:]]*\[0 2 -1 0 0 0 0\].*;/nu [0 2 -1 0 0 0 0] $INPUT_VISCOSITY;/" constant/transportProperties

          # 3. system/controlDict 수정 (해석 종료 시간 주입)
          # 이제 endTime 뒤에 JSON이 통째로 들어가는 대참사는 일어나지 않습니다.
          sed -i "s/^endTime[[:space:]]*.*;/endTime           $INPUT_END_TIME;/" system/controlDict

          # 실행 권한 부여 및 Allrun 실행
          chmod +x Allrun
          ./Allrun

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: OpenFOAM-Web-Dashboard
          path: OpenFOAM/case/results/
          if-no-files-found: warn
