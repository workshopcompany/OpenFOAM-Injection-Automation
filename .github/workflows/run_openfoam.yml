name: OpenFOAM Simulation

on:
  workflow_dispatch:
    inputs:
      velocity:
        description: 'Inlet Velocity (m/s)'
        default: '2.5'
        required: true
      viscosity:
        description: 'Kinematic Viscosity (m2/s)'
        default: '1e-6'
        required: true
      end_time:
        description: 'Simulation End Time (s)'
        default: '5'
        required: true
      run_label:
        description: 'Run Label (for report)'
        default: 'default-run'
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-sim:
    runs-on: ubuntu-latest
    container:
      image: opencfd/openfoam-run:2312
      options: --user root

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update && apt-get install -y --no-install-recommends \
            paraview python3-paraview \
            xvfb libgl1-mesa-glx libglu1-mesa libxcursor1 \
            python3-pip \
            jq \
            tzdata
          pip3 install jinja2 --break-system-packages || pip3 install jinja2

      - name: Run OpenFOAM Simulation
        shell: bash
        working-directory: OpenFOAM/case
        env:
          # 일단 들어오는 원본 데이터를 모두 받습니다.
          RAW_V: ${{ github.event.inputs.velocity }}
          RAW_N: ${{ github.event.inputs.viscosity }}
          RAW_E: ${{ github.event.inputs.end_time }}
        run: |
          set -e
          source /usr/lib/openfoam/openfoam2312/etc/bashrc 2>/dev/null || true
          
          echo ">>> [MIM-Ops] JSON 파싱 및 데이터 정제 시작"

          # 1. JSON 여부 확인 및 값 추출 (jq 사용)
          # 만약 RAW_V가 JSON 형태라면 내부의 값을 꺼내고, 아니면 그대로 사용합니다.
          if echo "$RAW_V" | jq -e . >/dev/null 2>&1; then
              echo "JSON input detected. Extracting values..."
              V_VAL=$(echo "$RAW_V" | jq -r '.velocity // "'$RAW_V'"')
              N_VAL=$(echo "$RAW_V" | jq -r '.viscosity // "'$RAW_N'"')
              E_VAL=$(echo "$RAW_V" | jq -r '.end_time // "'$RAW_E'"')
          else
              echo "Standard text input detected."
              V_VAL=$RAW_V
              N_VAL=$RAW_N
              E_VAL=$RAW_E
          fi

          # 2. 물리적 정제 (숫자, 소수점, 지수표현 e, 마이너스 기호 외 제거)
          # 이 단계에서 중괄호{}나 따옴표""가 완전히 삭제됩니다.
          FINAL_VELOCITY=$(echo "$V_VAL" | sed 's/[^0-9.eE-]*//g')
          FINAL_VISCOSITY=$(echo "$N_VAL" | sed 's/[^0-9.eE-]*//g')
          FINAL_END_TIME=$(echo "$E_VAL" | sed 's/[^0-9.eE-]*//g')

          echo "Final Cleaned Values -> Velocity: $FINAL_VELOCITY, Viscosity: $FINAL_VISCOSITY, EndTime: $FINAL_END_TIME"

          # 3. OpenFOAM 파일 수정
          # 0/U 수정
          sed -i "/inlet/,/}/ s/value[[:space:]]*uniform[[:space:]]*(.* 0 0);/value           uniform ($FINAL_VELOCITY 0 0);/" 0/U
          
          # constant/transportProperties 수정
          sed -i "s/nu[[:space:]]*\[0 2 -1 0 0 0 0\].*;/nu [0 2 -1 0 0 0 0] $FINAL_VISCOSITY;/" constant/transportProperties

          # system/controlDict 수정
          sed -i "s/^endTime[[:space:]]*.*;/endTime           $FINAL_END_TIME;/" system/controlDict

          echo ">>> [MIM-Ops] 파일 수정 완료. Allrun 실행."
          chmod +x Allrun
          ./Allrun

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: OpenFOAM-Web-Dashboard
          path: OpenFOAM/case/results/
