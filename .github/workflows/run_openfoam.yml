name: OpenFOAM PimpleFoam Simulation

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-sim:
    runs-on: ubuntu-latest
    container: 
      image: opencfd/openfoam-run:2312
      options: --user root
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install ParaView (for pvpython)
        run: |
          apt-get update
          apt-get install -y paraview python3-vtk9
      
      - name: Run OpenFOAM and Post-processing
        shell: bash
        run: |
          cd OpenFOAM/case
          source /usr/bin/openfoam2312 && ./Allrun
      
      - name: Debug - Find screenshots
        shell: bash
        run: |
          echo "=== Looking for generated files ==="
          find . -type f \( -name "*.png" -o -name "*.jpg" \) -ls || echo "No images found"
          
          echo ""
          echo "=== Case directory contents ==="
          ls -la OpenFOAM/case/ || true
      
      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flow-results
          path: |
            OpenFOAM/case/**/*.png
            OpenFOAM/case/**/*.jpg
            OpenFOAM/case/screenshots/
