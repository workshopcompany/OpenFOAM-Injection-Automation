name: OpenFOAM PimpleFoam Simulation

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-sim:
    runs-on: ubuntu-latest
    container: 
      image: opencfd/openfoam-run:2312
      options: --user root
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install ParaView (for pvpython)
        run: |
          apt-get update
          apt-get install -y paraview python3-vtk9
      
      - name: Run OpenFOAM and Post-processing
        shell: bash
        run: |
          cd OpenFOAM/case
          chmod +x Allrun
          bash -c "source /usr/bin/openfoam2312 && ./Allrun"
      
      - name: Debug - Check results
        shell: bash
        if: always()
        run: |
          echo "=== Screenshots folder ==="
          ls -la OpenFOAM/case/screenshots/ 2>/dev/null || echo "No screenshots folder"
          
          echo ""
          echo "=== All PNG/JPG files ==="
          find OpenFOAM/case -type f \( -name "*.png" -o -name "*.jpg" \) -ls || echo "No images"
          
          echo ""
          echo "=== VTK files (simulation output) ==="
          find OpenFOAM/case -name "*.vtk" -o -name "*.foam" || echo "No VTK files"
      
      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flow-results
          path: OpenFOAM/case/screenshots/
