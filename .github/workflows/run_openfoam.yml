name: OpenFOAM Simulation

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-sim:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    container: 
      image: opencfd/openfoam-run:2312
      options: --user root
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Post-Processing Dependencies
        run: |
          apt-get update
          apt-get install -y paraview python3-vtk9 xvfb libgl1-mesa-glx libglu1-mesa
      
      - name: Run OpenFOAM Simulation
        shell: bash
        working-directory: OpenFOAM/case
        run: |
          bash << 'SCRIPT_END'
          set -e
          source /usr/lib/openfoam/openfoam2312/etc/bashrc 2>/dev/null || true
          
          # 라이브러리 경로 강제 지정 (ParaView 충돌 방지)
          export LD_LIBRARY_PATH=/usr/lib/openfoam/openfoam2312/platforms/linux64GccDPInt32Opt/lib:$LD_LIBRARY_PATH
          
          chmod +x Allrun
          
          echo "Starting Simulation..."
          xvfb-run --auto-servernum --server-args="-screen 0 1024x768x24" ./Allrun
          
          echo "===== DEBUG: log.pvpython content ====="
          cat log.pvpython || echo "log.pvpython not found"
          
          echo "===== DEBUG: Final screenshots folder ====="
          ls -la screenshots/
          SCRIPT_END
      
      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flow-simulation-results
          path: OpenFOAM/case/screenshots/
          if-no-files-found: warn
