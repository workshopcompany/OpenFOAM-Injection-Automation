name: OpenFOAM Simulation

on:
  workflow_dispatch:
    inputs:
      velocity:
        description: 'Inlet Velocity (m/s)'
        default: '2.5'
        required: true
      viscosity:
        description: 'Kinematic Viscosity (m2/s)'
        default: '1e-6'
        required: true
      end_time:
        description: 'Simulation End Time (s)'
        default: '5'
        required: true
      run_label:
        description: 'Run Label (for report)'
        default: 'default-run'
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-sim:
    runs-on: ubuntu-latest
    container:
      image: opencfd/openfoam-run:2312
      options: --user root

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update && apt-get install -y --no-install-recommends \
            paraview python3-paraview \
            xvfb libgl1-mesa-glx libglu1-mesa libxcursor1 \
            python3-pip \
            tzdata
          pip3 install jinja2 --break-system-packages || pip3 install jinja2

      - name: Run OpenFOAM Simulation
        shell: bash
        working-directory: OpenFOAM/case
        env:
          INPUT_VELOCITY: ${{ github.event.inputs.velocity }}
          INPUT_VISCOSITY: ${{ github.event.inputs.viscosity }}
          INPUT_END_TIME: ${{ github.event.inputs.end_time }}
        run: |
          set -e
          source /usr/lib/openfoam/openfoam2312/etc/bashrc 2>/dev/null || true
          
          echo ">>> [MIM-Ops] 파라미터 업데이트 시작"

          # 1. 0/U 수정 (입구 유속)
          # 'inlet' 섹션 내부의 value 값을 정확히 찾아 바꿉니다.
          sed -i "/inlet/,/}/ s/value[[:space:]]*uniform[[:space:]]*(.* 0 0);/value           uniform ($INPUT_VELOCITY 0 0);/" 0/U
          
          # 2. constant/transportProperties 수정 (점도)
          # nu 뒤의 숫자만 정교하게 바꿉니다.
          sed -i "s/\(nu[[:space:]]*\[0 2 -1 0 0 0 0\][[:space:]]*\).*/\1$INPUT_VISCOSITY;/" constant/transportProperties

          # 3. system/controlDict 수정 (종료 시간)
          # endTime 뒤의 숫자만 정교하게 바꿉니다. (velocity 같은 엉뚱한 건 건드리지 않음)
          sed -i "s/\(endTime[[:space:]]*\).*/\1$INPUT_END_TIME;/" system/controlDict

          chmod +x Allrun
          ./Allrun

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: OpenFOAM-Web-Dashboard
          path: OpenFOAM/case/results/
