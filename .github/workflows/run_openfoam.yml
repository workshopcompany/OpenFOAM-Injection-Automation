name: MIM-Ops Flow Analysis
on:
  workflow_dispatch:
    inputs:
      material:
        description: 'Material Name (e.g., PP, ABS, Nylon66)'
        default: 'PP'
        required: true
      velocity:
        description: 'Injection Velocity (m/s)'
        default: '0.05'
      melt_temp:
        description: 'Melt Temperature (°C)'
        default: '230'
      end_time:
        description: 'Simulation End Time (s)'
        default: '2'

jobs:
  run-sim:
    runs-on: ubuntu-latest
    container:
      image: opencfd/openfoam-run:2312
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Simulation
        shell: bash
        working-directory: OpenFOAM/case
        env:
          VELOCITY: ${{ github.event.inputs.velocity }}
          MELT_TEMP: ${{ github.event.inputs.melt_temp }}
          END_TIME: ${{ github.event.inputs.end_time }}
        run: |
          chmod +x Allrun
          ./Allrun

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: simulation-results
          path: OpenFOAM/case/results/
