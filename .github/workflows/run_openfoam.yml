name: OpenFOAM Simulation

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-sim:
    runs-on: ubuntu-latest
    env:
      # Node.js 20 지원 중단 경고 해결을 위한 설정
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    container: 
      image: opencfd/openfoam-run:2312
      options: --user root
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install ParaView
        run: |
          apt-get update
          apt-get install -y paraview python3-vtk9
      
      - name: Run OpenFOAM Simulation
        shell: bash
        working-directory: OpenFOAM/case
        run: |
          bash << 'SCRIPT_END'
          set -e
          source /usr/lib/openfoam/openfoam2312/etc/bashrc 2>/dev/null || true
          
          # Allrun 실행 전 screenshots 폴더 선제 생성
          mkdir -p screenshots
          
          chmod +x Allrun
          ./Allrun
          
          # 후처리 결과 확인용 로그
          echo "===== Generated Results ====="
          ls -R
          echo "===== Screenshot Folder Content ====="
          ls -la screenshots/
          SCRIPT_END
      
      - name: Check Results
        if: always()
        run: |
          # 이미지가 실제로 어디에 있는지 검색
          find OpenFOAM/case -name "*.png" -o -name "*.jpg"
      
      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flow-results
          # 경로를 더 확실하게 지정
          path: OpenFOAM/case/screenshots/
          if-no-files-found: warn
