name: OpenFOAM PimpleFoam Simulation

on:
  push:
    branches: [ "main" ]  # 메인에 푸시될 때마다 실행
  workflow_dispatch:      # [Actions] 탭에서 버튼으로 수동 실행 가능하게 함

jobs:
  run-sim:
    runs-on: ubuntu-latest
    container: 
      image: opencfd/openfoam-run:2312
      options: --user root

    steps:
      - uses: actions/checkout@v4

      - name: Install ParaView (for pvpython)
        run: |
          apt-get update
          apt-get install -y paraview

      - name: Run OpenFOAM and Post-processing
        run: |
          # OpenFOAM 환경 소싱
          source /opt/openfoam10/etc/bashrc  # 실제 설치 경로 확인
    
          # 또는 Docker 컨테이너 내 경로
          # source /usr/lib/openfoam/openfoam10/etc/bashrc
          # OpenFOAM 환경 설정을 자동으로 찾아서 로드
          . ${FOAM_BASHRC:-/usr/lib/openfoam/openfoam10/etc/bashrc}
          
          cd OpenFOAM/case
          chmod +x Allrun
          ./Allrun

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        with:
          name: flow-results
          path: OpenFOAM/case/screenshots/
