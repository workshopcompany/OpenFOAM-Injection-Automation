name: MIM-Ops Flow Analysis

on:
  push:
    paths:
      - 'OpenFOAM/case/constant/transportProperties'
  workflow_dispatch:

jobs:
  run-sim:
    runs-on: ubuntu-latest
    container:
      image: opencfd/openfoam-dev:2312
      options: --user root

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Solver with Logging
        shell: bash
        working-directory: OpenFOAM/case
        run: |
          # 1. Load OpenFOAM environment
          . /usr/lib/openfoam/openfoam2312/etc/bashrc
          
          # 2. Setup permissions and CRLF fix
          sed -i 's/\r$//' Allrun
          chmod +x Allrun
          
          # 3. Execute Allrun and capture exit code
          echo ">>> Starting Pipeline execution..."
          ./Allrun || (echo "❌ Allrun failed. Printing solver.log:" && tail -n 50 logs/solver.log && exit 1)

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulation-results
          path: |
            OpenFOAM/case/results/
            OpenFOAM/case/logs/
