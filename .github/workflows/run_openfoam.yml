name: OpenFOAM Simulation

on:
  workflow_dispatch:
    inputs:
      velocity:
        description: 'Inlet Velocity (m/s)'
        default: '2.5'
        required: true
      viscosity:
        description: 'Kinematic Viscosity (m2/s)'
        default: '1e-6'
        required: true
      end_time:
        description: 'Simulation End Time (s)'
        default: '5'
        required: true
      run_label:
        description: 'Run Label (for report)'
        default: 'default-run'
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-sim:
    runs-on: ubuntu-latest
    container:
      # 빌드 단축을 위해 나중에 엔지니어님만의 커스텀 이미지로 교체하는 것이 좋습니다.
      image: opencfd/openfoam-run:2312
      options: --user root

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update && apt-get install -y --no-install-recommends \
            paraview python3-paraview \
            xvfb libgl1-mesa-glx libglu1-mesa libxcursor1 \
            python3-pip \
            tzdata
          # 에러 수정: 이전 버전 pip에서는 --break-system-packages 옵션이 없으므로 제거하거나 조건부 실행
          pip3 install jinja2 || pip3 install jinja2 --break-system-packages

      - name: Run OpenFOAM Simulation
        shell: bash
        working-directory: OpenFOAM/case
        env:
          INPUT_VELOCITY: ${{ github.event.inputs.velocity || '2.5' }}
          INPUT_VISCOSITY: ${{ github.event.inputs.viscosity || '1e-6' }}
          INPUT_END_TIME: ${{ github.event.inputs.end_time || '5' }}
          INPUT_RUN_LABEL: ${{ github.event.inputs.run_label || 'auto-run' }}
        run: |
          set -e
          source /usr/lib/openfoam/openfoam2312/etc/bashrc 2>/dev/null || true
          
          export PYTHONPATH=$PYTHONPATH:/usr/lib/python3/dist-packages
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/usr/lib/x86_64-linux-gnu
          export PVPYTHON_PATH=$(which pvpython || echo "/usr/bin/pvpython")
          
          chmod +x Allrun
          ./Allrun

      - name: Sync Results to Workspace
        if: always()
        shell: bash
        working-directory: OpenFOAM/case
        run: |
          mkdir -p ${{ github.workspace }}/sync_results
          # 결과 폴더 확인 및 강제 생성 (실패 방지)
          if [ -d "results" ] && [ "$(ls -A results/ 2>/dev/null)" ]; then
            cp -rv results/* ${{ github.workspace }}/sync_results/
          else
            echo "Warning: Results folder not found or empty. Creating dummy for artifact."
            touch ${{ github.workspace }}/sync_results/empty_result.txt
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: OpenFOAM-Web-Dashboard
          path: sync_results/
